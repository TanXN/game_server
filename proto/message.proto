syntax = "proto3";

package game_server;

message LoginReq {
    string username = 1;
}

message LoginResp {
    int64 code = 1;
    int64 playerId = 2;
    string message = 3;
    string token = 4;
}

message MatchReq {
    int64 playerId = 1;
}

message MatchResp {
    int64 code = 1;
    string message = 2;
}

message MatchCancelReq {
    int64 playerId = 1;
}

message MatchCancelResp {
    int64 code = 1;
    string message = 2;
}

message RoomCreatedNotify {
    int64 roomId = 1;
    repeated int64 players = 2;
}

message ChatReq {
    int64 roomId = 1;
    string text = 2;
}


message ChatNotify {
    int64 roomId = 1;
    int64 playerId = 2;
    string text = 3;
}

message ChatResp {
    int64 code = 1;
    string message = 2;
}


message HeartbeatReq {
    int64 client_time_ms = 1;
}

message HeartbeatResp {
    int64 client_time_ms = 1;
    int64 server_time_ms = 2;
}

message ReconnectReq {
    int64 player_id = 1;
    string token = 2;
}

message ReconnectResp {
    int64 code = 1;
    int32 player_id = 2;
    int32 room_id = 3;
    string message = 4;
}






